{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot Movie Assistant | Movie Recommendation System</title>
  <link rel="shortcut icon" href="{% static 'logo.ico' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --panel: rgba(30, 41, 59, 0.72);
      --border: rgba(255,255,255,0.12);
      --text: #f1f5f9;
      --muted: #cbd5e1;
      --accent: rgb(146, 224, 232);
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg) 0%, #1a1f3a 100%);
      background-image: url("{% static 'images/back4.jpg' %}");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 2rem 1rem 3rem;
    }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }
    .title {
      font-size: clamp(1.6rem, 3.5vw, 2.3rem);
      font-weight: 800;
      margin: 0;
      color: var(--accent);
      text-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    .back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.1rem;
      border-radius: 999px;
      border: 1px solid var(--accent);
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
      background: rgba(0,0,0,0.18);
      backdrop-filter: blur(10px);
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      backdrop-filter: blur(14px);
      overflow: hidden;
    }
    .hint { color: var(--muted); margin: 0.4rem 0 1rem; }
    .chat {
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 0.85rem;
      min-height: 62vh;
    }
    .log {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(0,0,0,0.18);
      padding: 1rem;
      overflow: auto;
    }
    .msg {
      display: grid;
      gap: 0.25rem;
      margin-bottom: 0.85rem;
    }
    .who { font-weight: 900; color: var(--accent); font-size: 0.9rem; }
    .bubble {
      padding: 0.75rem 0.9rem;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.40);
      color: var(--text);
      white-space: pre-wrap;
      line-height: 1.55;
    }
    .bubble.user { background: rgba(146,224,232,0.12); }
    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.65rem;
      align-items: center;
    }
    input[type="text"]{
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.55);
      color: var(--text);
      padding: 0.85rem 0.95rem;
      font-size: 1rem;
      outline: none;
    }
    input[type="text"]:focus { border-color: rgba(146, 224, 232, 0.55); box-shadow: 0 0 0 3px rgba(146,224,232,0.14); }
    button {
      border: 0;
      border-radius: 14px;
      padding: 0.85rem 1.05rem;
      font-weight: 900;
      cursor: pointer;
      background: var(--accent);
      color: #071018;
      white-space: nowrap;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 0.75rem;
      margin-top: 0.65rem;
    }
    .card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.85rem;
      background: rgba(0,0,0,0.12);
    }
    .card-title { font-weight: 900; margin: 0 0 0.35rem; }
    .card-meta { color: var(--muted); font-weight: 600; font-size: 0.9rem; }
    .card a { color: var(--accent); text-decoration: none; font-weight: 800; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1 class="title">AI Chatbot Movie Assistant</h1>
      <a class="back" href="/">← Back</a>
    </div>

    <div class="panel">
      <p class="hint">Try: “Suggest thriller movies”, “Movies like Inception”, or paste a title.</p>

      <div class="chat">
        <div id="log" class="log" aria-live="polite"></div>

        <form id="composer" class="composer">
          {% csrf_token %}
          <input id="msg" type="text" placeholder="Ask for movies…" autocomplete="off" />
          <button id="send" type="submit">Send</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    function getCookie(name) {
      var cookieValue = null;
      if (document.cookie && document.cookie !== '') {
        var cookies = document.cookie.split(';');
        for (var i = 0; i < cookies.length; i++) {
          var cookie = cookies[i].trim();
          if (cookie.substring(0, name.length + 1) === (name + '=')) {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    }

    async function postJson(url, payload) {
      const csrftoken = getCookie('csrftoken');
      const res = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': csrftoken || ''
        },
        body: JSON.stringify(payload || {})
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data && data.error ? data.error : 'Request failed');
      return data;
    }

    const log = document.getElementById('log');
    const form = document.getElementById('composer');
    const input = document.getElementById('msg');
    const sendBtn = document.getElementById('send');

    function addMessage(who, text, items) {
      const wrap = document.createElement('div');
      wrap.className = 'msg';

      const whoEl = document.createElement('div');
      whoEl.className = 'who';
      whoEl.textContent = who;

      const bubble = document.createElement('div');
      bubble.className = 'bubble' + (who === 'You' ? ' user' : '');
      bubble.textContent = text || '';

      wrap.appendChild(whoEl);
      wrap.appendChild(bubble);

      if (Array.isArray(items) && items.length) {
        const cards = document.createElement('div');
        cards.className = 'cards';

        items.slice(0, 10).forEach(it => {
          const c = document.createElement('div');
          c.className = 'card';
          const t = document.createElement('div');
          t.className = 'card-title';
          t.textContent = it.title || 'Movie';
          const m = document.createElement('div');
          m.className = 'card-meta';
          const parts = [];
          if (it.rating) parts.push(it.rating);
          if (it.genres) parts.push(it.genres);
          if (it.release_date) parts.push(it.release_date);
          m.textContent = parts.join(' • ');
          c.appendChild(t);
          if (m.textContent) c.appendChild(m);
          if (it.google_link) {
            const a = document.createElement('a');
            a.href = it.google_link;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.textContent = 'Open';
            c.appendChild(document.createElement('div')).appendChild(a);
          }
          cards.appendChild(c);
        });
        wrap.appendChild(cards);
      }

      log.appendChild(wrap);
      log.scrollTop = log.scrollHeight;
    }

    addMessage('Assistant', 'Ask me for movies by genre, or say “Movies like <title>”.', []);

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const message = (input.value || '').trim();
      if (!message) return;
      input.value = '';
      addMessage('You', message, []);
      sendBtn.disabled = true;
      try {
        const res = await postJson('/api/chat/', { message });
        addMessage('Assistant', res.text || 'Done.', res.items || []);
      } catch (err) {
        addMessage('Assistant', (err && err.message) ? err.message : 'Something went wrong.', []);
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
